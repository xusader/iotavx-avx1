# ============================================================
# IOTAVX AVX1 – Lovelace Dashboard Karte
# ============================================================
# Füge dies zu deinem Dashboard hinzu (YAML-Modus).

type: vertical-stack
cards:
  # Haupt-Steuerung
  - type: media-control
    entity: media_player.iotavx_avx1

  # Quellen-Auswahl als Buttons
  - type: horizontal-stack
    cards:
      - type: button
        name: TV (ARC)
        icon: mdi:television
        tap_action:
          action: call-service
          service: media_player.select_source
          target:
            entity_id: media_player.iotavx_avx1
          data:
            source: "TV (ARC)"
      - type: button
        name: HDMI 1
        icon: mdi:video-input-hdmi
        tap_action:
          action: call-service
          service: media_player.select_source
          target:
            entity_id: media_player.iotavx_avx1
          data:
            source: "HDMI 1"
      - type: button
        name: HDMI 2
        icon: mdi:video-input-hdmi
        tap_action:
          action: call-service
          service: media_player.select_source
          target:
            entity_id: media_player.iotavx_avx1
          data:
            source: "HDMI 2"
      - type: button
        name: HDMI 3
        icon: mdi:video-input-hdmi
        tap_action:
          action: call-service
          service: media_player.select_source
          target:
            entity_id: media_player.iotavx_avx1
          data:
            source: "HDMI 3"

  # Sound Modes
  - type: horizontal-stack
    cards:
      - type: button
        name: Stereo
        icon: mdi:speaker
        tap_action:
          action: call-service
          service: media_player.select_sound_mode
          target:
            entity_id: media_player.iotavx_avx1
          data:
            sound_mode: Stereo
      - type: button
        name: Pro Logic
        icon: mdi:surround-sound
        tap_action:
          action: call-service
          service: media_player.select_sound_mode
          target:
            entity_id: media_player.iotavx_avx1
          data:
            sound_mode: "Pro Logic IIx"
      - type: button
        name: Neo:6
        icon: mdi:surround-sound-5-1
        tap_action:
          action: call-service
          service: media_player.select_sound_mode
          target:
            entity_id: media_player.iotavx_avx1
          data:
            sound_mode: "Neo:6"

  # Trim & Dimmer
  - type: entities
    title: Feineinstellungen
    entities:
      - entity: number.iotavx_avx1_dimmer
        name: Display Helligkeit
      - entity: number.iotavx_avx1_center_trim
        name: Center Trim
      - entity: number.iotavx_avx1_sub_trim
        name: Subwoofer Trim
      - entity: number.iotavx_avx1_surround_trim
        name: Surround Trim

  # OSD-Navigation (Remote)
  - type: grid
    title: OSD Navigation
    columns: 3
    cards:
      - type: button
        name: ""
        show_name: false
        show_icon: false
      - type: button
        icon: mdi:arrow-up
        tap_action:
          action: call-service
          service: remote.send_command
          target:
            entity_id: remote.iotavx_avx1_remote
          data:
            command: [up]
      - type: button
        name: ""
        show_name: false
        show_icon: false
      - type: button
        icon: mdi:arrow-left
        tap_action:
          action: call-service
          service: remote.send_command
          target:
            entity_id: remote.iotavx_avx1_remote
          data:
            command: [left]
      - type: button
        icon: mdi:radiobox-marked
        name: OK
        tap_action:
          action: call-service
          service: remote.send_command
          target:
            entity_id: remote.iotavx_avx1_remote
          data:
            command: [enter]
      - type: button
        icon: mdi:arrow-right
        tap_action:
          action: call-service
          service: remote.send_command
          target:
            entity_id: remote.iotavx_avx1_remote
          data:
            command: [right]
      - type: button
        icon: mdi:menu
        name: Menü
        tap_action:
          action: call-service
          service: remote.send_command
          target:
            entity_id: remote.iotavx_avx1_remote
          data:
            command: [menu]
      - type: button
        icon: mdi:arrow-down
        tap_action:
          action: call-service
          service: remote.send_command
          target:
            entity_id: remote.iotavx_avx1_remote
          data:
            command: [down]
      - type: button
        icon: mdi:exit-run
        name: Exit
        tap_action:
          action: call-service
          service: remote.send_command
          target:
            entity_id: remote.iotavx_avx1_remote
          data:
            command: [exit]
